name: Zero Trust Network Access
description: A security framework that requires strict identity verification for every
  person and device attempting to access resources on a network, regardless of whether
  they are inside or outside the network perimeter. ZTNA operates on the principle
  of "never trust, always verify" and provides granular access control based on user
  identity, device posture, and context.
